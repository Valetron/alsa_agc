pcm.agc {
    @args [ SLAVE FRAME_LEN CHANNELS RATE
            FILTER_SIZE PEAK GAIN RMS ]
    @args.SLAVE {
        type string
        default "plug:hw"
    }
    @args.FRAME_LEN {
        type integer
        default 20
    }
    @args.CHANNELS {
        type integer
        default 1
    }
    @args.RATE {
        type integer
        default 8000
    }
    @args.FILTER_SIZE {
        type integer
        default 13
    }
    @args.PEAK {
        type real
        default 0.95
    }
    @args.GAIN {
        type real
        default 100.0
    }
    @args.RMS {
        type real
        default 0.0
    }

    type agc
    frame_len $FRAME_LEN
    channels $CHANNELS
    rate $RATE
    filter_size $FILTER_SIZE
    peak $PEAK
    gain $GAIN
    rms $RMS
    slave.pcm $SLAVE

    hint {
        show {
            @func refer
            name defaults.namehint.basic
        }
        description "AGC filter by Valetron"
    }
}
