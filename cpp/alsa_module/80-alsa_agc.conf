pcm.agc {
    @args [ SLAVE FRAME_LEN CHANNELS RATE
            FILTER_SIZE PEAK GAIN RMS ]
    @args.SLAVE {
        type string
        default "plug:hw"
    }
    @args.FRAME_LEN {
        type integer
        default 20
    }
    @args.CHANNELS {
        type integer
        default 1
    }
    @args.RATE {
        type integer
        default 8000
    }
    @args.FILTER_SIZE {
        type integer
        default 13
    }
    @args.PEAK {
        type real
        default 0.95
    }
    @args.GAIN {
        type real
        default 100.0
    }
    @args.RMS {
        type real
        default 0.0
    }
}
